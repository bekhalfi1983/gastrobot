ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true

    # Coordinate Frames - MUST MATCH YOUR URDF
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint # Changed from base_link to match URDF root
    world_frame: odom

    # =============================================================
    # WHEEL ODOMETRY (Fuse Velocity)
    # =============================================================
    odom0: /odom
    # Fusing X velocity and Yaw velocity for smoother movement
    odom0_config: [false, false, false, # Position (X, Y, Z)
                   false, false, false, # Orientation (R, P, Y)
                   true,  false, false, # Linear Velocity (X) - MUST BE TRUE
                   false, false, true,  # Angular Velocity (Z) - MUST BE TRUE
                   false, false, false] # Acceleration

    odom0_differential: false
    odom0_relative: true  # Changed to true for velocity integration
    odom0_queue_size: 10

    # =============================================================
    # IMU (Fuse Orientation and Yaw Rate)
    # =============================================================
    imu0: /imu/data
    imu0_config: [false, false, false, 
                  false, false, true,  # Orientation (Yaw)
                  false, false, false, 
                  false, false, true,  # Angular Velocity (Yaw Rate)
                  false, false, false] 

    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
