ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # =============================================================
    # WHEEL ODOMETRY (Fuse Velocity Only)
    # =============================================================
    odom0: /odom
    odom0_config: [true, true, false, # Position (X, Y, Z)
                   false, false, false, # Orientation (R, P, Y)
                   true,  false, false, # Linear Velocity (X)
                   false, false, true,  # Angular Velocity (Z)
                   false, false, false] # Acceleration

    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # =============================================================
    # IMU (Fuse Angular Velocity/Yaw Rate Only)
    # =============================================================
    imu0: /imu/data
    imu0_config: [false, false, false, # Position
                  false, false, true, # Orientation
                  false, false, false, # Velocity
                  false, false, true,  # Angular Velocity (Yaw Rate)
                  false, false, false] # Acceleration

    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true

