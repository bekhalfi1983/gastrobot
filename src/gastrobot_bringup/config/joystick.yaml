joy_node:
  ros__parameters:
    device_id: 0
    deadzone: 0.15
    autorepeat_rate: 20.0
    sticky_buttons: false

teleop_node:
  ros__parameters:
    require_enable_button: true
    enable_button: 4
    enable_turbo_button: 5

    axis_linear:
      x: 1
    scale_linear:
      x: 0.45
    scale_linear_turbo:
      x: 0.80

    axis_angular:
      yaw: 3
    scale_angular:
      yaw: 1.5
    scale_angular_turbo:
      yaw: 2.2
