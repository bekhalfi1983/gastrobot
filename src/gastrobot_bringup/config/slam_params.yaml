slam_toolbox:
  ros__parameters:

    # =============================
    # CORE FIXES (CRITICAL)
    # =============================
    mode: mapping
    publish_tf: true
    use_sim_time: false

    # =============================
    # FRAMES & TOPICS
    # =============================
    scan_topic: /scan

    odom_frame: odom
    map_frame: map
    base_frame: base_link

    # =============================
    # CORE BEHAVIOR
    # =============================
    use_odometry: true
    use_scan_matching: true
    use_scan_barycenter: true

    # =============================
    # MAP SETTINGS
    # =============================
    resolution: 0.05
    max_laser_range: 8.0

    # =============================
    # MOTION FILTER (STABLE)
    # =============================
    minimum_travel_distance: 0.10
    minimum_travel_heading: 0.10

    # =============================
    # TF SETTINGS
    # =============================
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    transform_publish_period: 0.02

    # =============================
    # UPDATE RATE (STABLE)
    # =============================
    map_update_interval: 0.5

    # =============================
    # SCAN MATCHING (STABLE)
    # =============================
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0

    link_match_minimum_response_fine: 0.45
    link_scan_maximum_distance: 1.0

    # =============================
    # LOOP CLOSING (SAFE)
    # =============================
    do_loop_closing: true
    loop_search_maximum_distance: 3.0
    loop_match_minimum_chain_size: 3
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.5
    loop_match_minimum_response_fine: 0.6

    # =============================
    # CORRELATION PARAMETERS
    # =============================
    correlation_search_space_dimension: 0.2
    correlation_search_space_resolution: 0.02
    correlation_search_space_smear_deviation: 0.05

    # =============================
    # MATCHING PENALTIES (BALANCED)
    # =============================
    distance_variance_penalty: 1.0
    angle_variance_penalty: 1.5

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.01745

    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5

    # =============================
    # STABILITY
    # =============================
    use_response_expansion: true
